<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>점프킹</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--board);
    padding: 0;
  }
  .jk-wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .jk-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    color: var(--chalk);
  }
  .jk-top a { color: var(--chalk); text-decoration: none; font-size: 13px; font-weight: 600; }
  .jk-hud { display: flex; gap: 12px; font-size: 13px; }
  .jk-hud b { color: #ffd76a; }
  #jkCanvas {
    display: block;
    width: 100%;
    aspect-ratio: 4 / 7;
    background: #cfe8e0;
    touch-action: none;
    -webkit-touch-callout: none;
  }
  .jk-controls { padding: 10px 14px 18px; display: flex; flex-direction: column; gap: 8px; }
  .jk-chargebar { height: 10px; background: rgba(245,244,239,.2); border-radius: 6px; overflow: hidden; }
  .jk-chargefill { height: 100%; width: 0%; background: #ffd76a; }
  .jk-btnrow { display: flex; gap: 10px; }
  .jk-btn {
    flex: 1;
    padding: 22px 0;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: var(--board-light);
    color: var(--chalk);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .jk-btn:active { background: #4c6c56; }
  .jk-overlay {
    position: fixed; inset: 0;
    background: rgba(34,40,31,.72);
    display: none; align-items: center; justify-content: center;
    z-index: 10; padding: 20px;
  }
  .jk-overlay.show { display: flex; }
  .jk-panel { background: #fff; border-radius: 12px; padding: 22px; max-width: 320px; width: 100%; text-align: center; }
  .jk-panel h2 { margin: 0 0 8px; font-size: 20px; }
  .jk-panel p { margin: 4px 0; font-size: 14px; color: #55604f; }
  .jk-panel .btn { margin-top: 14px; }
  .jk-lb-list { text-align: left; margin-top: 10px; max-height: 260px; overflow-y: auto; }
  .jk-lb-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 4px; border-bottom: 1px solid var(--line); }
  .jk-lb-row b { color: var(--board); }
</style>
</head>
<body>
  <div class="jk-wrap">
    <div class="jk-top">
      <a href="../minigames.html">← 목록</a>
      <div class="jk-hud">
        <span>LV <b id="hudLevel">1</b>/5</span>
        <span>🪙 <b id="hudCoins">0</b></span>
      </div>
      <a href="#" id="btnRanking">🏆 랭킹</a>
    </div>

    <canvas id="jkCanvas"></canvas>

    <div class="jk-controls">
      <div class="jk-chargebar"><div class="jk-chargefill" id="chargeFill"></div></div>
      <div class="jk-btnrow">
        <button class="jk-btn" id="btnLeft">⬅ 점프</button>
        <button class="jk-btn" id="btnRight">점프 ➡</button>
      </div>
    </div>
  </div>

  <div class="jk-overlay" id="clearOverlay">
    <div class="jk-panel">
      <h2 id="clearTitle">레벨 클리어!</h2>
      <p id="clearDesc"></p>
      <button class="btn" id="clearNextBtn">다음 레벨</button>
    </div>
  </div>

  <div class="jk-overlay" id="finishOverlay">
    <div class="jk-panel">
      <h2>🎉 게임 클리어!</h2>
      <p id="finishDesc"></p>
      <button class="btn" id="finishRestartBtn">처음부터 다시하기</button>
    </div>
  </div>

  <div class="jk-overlay" id="lbOverlay">
    <div class="jk-panel">
      <h2>🏆 랭킹 TOP 10</h2>
      <div class="jk-lb-list" id="lbList">불러오는 중...</div>
      <button class="btn" id="lbCloseBtn">닫기</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/supabaseClient.js"></script>
  <script>
    // ── 설정값 (난이도/물리 조절은 여기서) ─────────────────────
    const CFG = {
      W: 400, H: 700,
      GRAVITY: 1600,
      CHARGE_MAX_MS: 900,
      VY_MIN: 420, VY_MAX: 760,
      VX_MIN: 90, VX_MAX: 260,
      R: 12,
      FALL_LIMIT: 260,
      PLATFORM_H: 14,
    };

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    // steps: 이전 발판 기준 상대 이동으로 발판을 이어붙임
    // spikeDefs/coinDefs: after=몇 번째 발판(0=시작) 기준 상대 오프셋
    function buildLevel(startX, startY, steps, spikeDefs, coinDefs) {
      const platforms = [{ x: startX, y: startY, w: 90, h: CFG.PLATFORM_H, type: "normal" }];
      let x = startX, y = startY;
      for (const s of steps) {
        x = clamp(x + s.dx, 20, CFG.W - 20 - (s.w || 65));
        y = y - s.dy;
        platforms.push({
          x, y, w: s.w || 65, h: CFG.PLATFORM_H,
          type: s.type || "normal",
          baseX: x, prevX: x,
          moveAmp: s.moveAmp || 0,
          moveSpeed: s.moveSpeed || 0,
          phase: Math.random() * Math.PI * 2,
          visible: true,
        });
      }
      const spikes = (spikeDefs || []).map(sd => ({
        x: platforms[sd.after].x + sd.dx,
        y: platforms[sd.after].y - sd.dy,
        w: sd.w || 34, h: 14,
      }));
      const coins = (coinDefs || []).map(cd => ({
        x: platforms[cd.after].x + platforms[cd.after].w / 2 + cd.dx,
        y: platforms[cd.after].y - cd.dy,
        r: 8, collected: false,
      }));
      const last = platforms[platforms.length - 1];
      const goal = { x: last.x + last.w / 2 - 20, y: last.y - 100, w: 40, h: 70 };
      return { platforms, spikes, coins, goal };
    }

    const LEVELS = [
      buildLevel(160, 650, [
        {dx:70,dy:55,w:80},{dx:-75,dy:55,w:80},{dx:70,dy:55,w:75},{dx:-70,dy:55,w:75},
        {dx:65,dy:55,w:70},{dx:-70,dy:55,w:70},{dx:70,dy:55,w:70},{dx:-65,dy:55,w:70},
        {dx:0,dy:60,w:90}
      ], [], [
        {after:2,dx:10,dy:40},{after:5,dx:-5,dy:40},{after:7,dx:15,dy:40}
      ]),
      buildLevel(160, 650, [
        {dx:75,dy:60,w:75},{dx:80,dy:60,w:70},{dx:-75,dy:55,w:70},{dx:75,dy:60,w:65},
        {dx:-70,dy:55,w:65},{dx:75,dy:60,w:65},{dx:-70,dy:55,w:65},{dx:70,dy:60,w:65},
        {dx:0,dy:65,w:90}
      ], [
        {after:0,dx:110,dy:35,w:32},{after:4,dx:-45,dy:32,w:34}
      ], [
        {after:1,dx:10,dy:40},{after:5,dx:0,dy:40},{after:7,dx:10,dy:40}
      ]),
      buildLevel(160, 650, [
        {dx:70,dy:60,w:70},{dx:80,dy:60,w:60,type:"move",moveAmp:45,moveSpeed:0.7},
        {dx:-70,dy:55,w:65},{dx:75,dy:60,w:60,type:"move",moveAmp:40,moveSpeed:0.9},
        {dx:-65,dy:55,w:60},{dx:70,dy:60,w:60},
        {dx:-70,dy:55,w:60,type:"move",moveAmp:35,moveSpeed:0.8},
        {dx:75,dy:60,w:60},{dx:0,dy:65,w:90}
      ], [
        {after:1,dx:75,dy:30,w:34}
      ], [
        {after:1,dx:0,dy:45},{after:5,dx:10,dy:40},{after:8,dx:0,dy:35}
      ]),
      buildLevel(160, 650, [
        {dx:75,dy:60,w:65},{dx:-75,dy:60,w:60,type:"fade"},
        {dx:75,dy:60,w:60,type:"move",moveAmp:40,moveSpeed:0.9},
        {dx:-70,dy:60,w:55,type:"fade"},{dx:75,dy:60,w:55},
        {dx:-75,dy:60,w:55,type:"move",moveAmp:45,moveSpeed:1.0},
        {dx:70,dy:60,w:55,type:"fade"},{dx:-70,dy:65,w:55},
        {dx:0,dy:65,w:90}
      ], [
        {after:0,dx:110,dy:38,w:32},{after:4,dx:65,dy:30,w:32}
      ], [
        {after:2,dx:0,dy:40},{after:5,dx:0,dy:40},{after:7,dx:0,dy:35}
      ]),
      buildLevel(160, 650, [
        {dx:80,dy:65,w:60},{dx:-80,dy:60,w:55,type:"move",moveAmp:50,moveSpeed:1.1},
        {dx:80,dy:65,w:55,type:"fade"},{dx:-75,dy:60,w:50},
        {dx:80,dy:65,w:50,type:"move",moveAmp:45,moveSpeed:1.2},
        {dx:-80,dy:60,w:50,type:"fade"},{dx:75,dy:65,w:50},
        {dx:-75,dy:60,w:50,type:"move",moveAmp:50,moveSpeed:1.0},
        {dx:80,dy:65,w:55,type:"fade"},{dx:0,dy:70,w:90}
      ], [
        {after:0,dx:110,dy:38,w:32},{after:3,dx:-40,dy:34,w:32},{after:6,dx:70,dy:40,w:32}
      ], [
        {after:1,dx:0,dy:42},{after:4,dx:0,dy:42},{after:7,dx:0,dy:40}
      ]),
    ];

    // ── DOM / 상태 ─────────────────────────────────────────
    const canvas = document.getElementById("jkCanvas");
    const ctx = canvas.getContext("2d");
    const hudLevel = document.getElementById("hudLevel");
    const hudCoins = document.getElementById("hudCoins");
    const chargeFill = document.getElementById("chargeFill");

    let levelIndex = 0;
    let level = LEVELS[0];
    let totalCoins = 0;
    let player = null;
    let lastCheckpoint = null;
    let cameraY = 0;
    let charging = false, chargeDir = 0, chargeStart = 0;
    let running = false;
    let currentUser = null;
    let lastTime = performance.now();

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = CFG.W * dpr;
      canvas.height = CFG.H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);

    function resetPlayerToStart() {
      const s = level.platforms[0];
      player = { x: s.x + s.w / 2, y: s.y - CFG.R, vx: 0, vy: 0, onGround: true, standingOn: s };
      lastCheckpoint = s;
    }

    function loadLevel(i) {
      levelIndex = i;
      level = LEVELS[i];
      for (const c of level.coins) c.collected = false;
      resetPlayerToStart();
      hudLevel.textContent = i + 1;
    }

    function respawn() {
      // 낙사/가시 접촉 시 레벨 처음(시작 발판)부터 다시 시작
      const s = level.platforms[0];
      player.x = s.x + s.w / 2;
      player.y = s.y - CFG.R;
      player.vx = 0; player.vy = 0;
      player.onGround = true;
      player.standingOn = s;
      lastCheckpoint = s;
    }

    function startCharge(dir) {
      if (!running || !player.onGround) return;
      charging = true; chargeDir = dir; chargeStart = performance.now();
    }

    function releaseCharge() {
      if (!charging) return;
      charging = false;
      const held = Math.min(performance.now() - chargeStart, CFG.CHARGE_MAX_MS);
      const c = held / CFG.CHARGE_MAX_MS;
      const vy = CFG.VY_MIN + c * (CFG.VY_MAX - CFG.VY_MIN);
      const vx = (CFG.VX_MIN + c * (CFG.VX_MAX - CFG.VX_MIN)) * chargeDir;
      player.vy = -vy;
      player.vx = vx;
      player.onGround = false;
      player.standingOn = null;
    }

    function computeScore() {
      return (levelIndex + 1) * 500 + totalCoins * 20;
    }

    function update(dt, now) {
      for (const p of level.platforms) {
        if (p.type === "move") {
          const prevX = p.x;
          p.x = p.baseX + Math.sin(now / 1000 * p.moveSpeed * Math.PI * 2 + p.phase) * p.moveAmp;
          if (player.onGround && player.standingOn === p) player.x += (p.x - prevX);
        }
        if (p.type === "fade") {
          const wasVisible = p.visible;
          p.visible = ((now + p.phase * 1000) % 1800) < 1100;
          if (wasVisible && !p.visible && player.onGround && player.standingOn === p) {
            player.onGround = false;
            player.standingOn = null;
          }
        }
      }

      if (!player.onGround) {
        player.vy += CFG.GRAVITY * dt;
        const prevY = player.y;
        player.y += player.vy * dt;
        player.x += player.vx * dt;

        if (player.x < CFG.R) { player.x = CFG.R; player.vx = 0; }
        if (player.x > CFG.W - CFG.R) { player.x = CFG.W - CFG.R; player.vx = 0; }

        for (const sp of level.spikes) {
          const withinX = player.x + CFG.R > sp.x && player.x - CFG.R < sp.x + sp.w;
          const withinY = player.y + CFG.R > sp.y && player.y - CFG.R < sp.y + sp.h;
          if (withinX && withinY) { respawn(); return; }
        }

        if (player.vy > 0) {
          for (const p of level.platforms) {
            if (p.type === "fade" && !p.visible) continue;
            const withinX = player.x + CFG.R > p.x && player.x - CFG.R < p.x + p.w;
            const feetPrev = prevY + CFG.R;
            const feetNow = player.y + CFG.R;
            if (withinX && feetPrev <= p.y && feetNow >= p.y) {
              player.y = p.y - CFG.R;
              player.vy = 0; player.vx = 0;
              player.onGround = true;
              player.standingOn = p;
              lastCheckpoint = p;
              break;
            }
          }
        }

        if (player.y - lastCheckpoint.y > CFG.FALL_LIMIT || player.y > CFG.H + 200) {
          respawn();
          return;
        }
      }

      for (const c of level.coins) {
        if (c.collected) continue;
        const dx = player.x - c.x, dy = player.y - c.y;
        if (Math.sqrt(dx * dx + dy * dy) < CFG.R + c.r) {
          c.collected = true;
          totalCoins++;
          hudCoins.textContent = totalCoins;
        }
      }

      const g = level.goal;
      if (player.x + CFG.R > g.x && player.x - CFG.R < g.x + g.w &&
          player.y + CFG.R > g.y && player.y - CFG.R < g.y + g.h) {
        onLevelClear();
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function render(now) {
      cameraY = player.y - CFG.H * 0.62;

      ctx.fillStyle = "#cfe8e0";
      ctx.fillRect(0, 0, CFG.W, CFG.H);

      for (const p of level.platforms) {
        if (p.type === "fade" && !p.visible) continue;
        const sy = p.y - cameraY;
        if (sy < -40 || sy > CFG.H + 40) continue;
        ctx.fillStyle = p.type === "fade" ? "#e0b64d" : (p.type === "move" ? "#5a7d68" : "#3f5a49");
        roundRect(p.x, sy, p.w, p.h, 4);
        ctx.fill();
      }

      ctx.fillStyle = "#b3432b";
      for (const sp of level.spikes) {
        const sy = sp.y - cameraY;
        if (sy < -40 || sy > CFG.H + 40) continue;
        const teeth = Math.max(2, Math.floor(sp.w / 12));
        const tw = sp.w / teeth;
        for (let i = 0; i < teeth; i++) {
          ctx.beginPath();
          ctx.moveTo(sp.x + i * tw, sy + sp.h);
          ctx.lineTo(sp.x + i * tw + tw / 2, sy);
          ctx.lineTo(sp.x + (i + 1) * tw, sy + sp.h);
          ctx.closePath();
          ctx.fill();
        }
      }

      for (const c of level.coins) {
        if (c.collected) continue;
        const sy = c.y - cameraY;
        if (sy < -20 || sy > CFG.H + 20) continue;
        ctx.beginPath();
        ctx.fillStyle = "#ffd76a";
        ctx.arc(c.x, sy, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#c99a2e";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      const g = level.goal;
      const gy = g.y - cameraY;
      ctx.strokeStyle = "#2f4538";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(g.x + 4, gy + g.h);
      ctx.lineTo(g.x + 4, gy);
      ctx.stroke();
      ctx.fillStyle = "#b3432b";
      ctx.beginPath();
      ctx.moveTo(g.x + 4, gy);
      ctx.lineTo(g.x + 32, gy + 8);
      ctx.lineTo(g.x + 4, gy + 16);
      ctx.closePath();
      ctx.fill();

      const py = player.y - cameraY;
      ctx.beginPath();
      ctx.fillStyle = "#f5f4ef";
      ctx.arc(player.x, py, CFG.R, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#2f4538";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "#2f4538";
      const eyeDir = player.vx > 5 ? 1 : (player.vx < -5 ? -1 : 0);
      ctx.beginPath();
      ctx.arc(player.x + eyeDir * 3, py - 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function onLevelClear() {
      running = false;
      if (levelIndex >= LEVELS.length - 1) {
        document.getElementById("finishDesc").textContent =
          `최종 레벨 ${LEVELS.length} 클리어! 코인 ${totalCoins}개 · 점수 ${computeScore()}점`;
        document.getElementById("finishOverlay").classList.add("show");
        submitScore();
      } else {
        document.getElementById("clearTitle").textContent = `레벨 ${levelIndex + 1} 클리어!`;
        document.getElementById("clearDesc").textContent = `코인 ${totalCoins}개 모음 · 다음 레벨은 더 어려워요`;
        document.getElementById("clearOverlay").classList.add("show");
      }
    }

    async function submitScore() {
      if (!currentUser) return;
      try {
        await sb.from("game_scores").insert({
          user_id: currentUser.id,
          username: currentUser.username,
          game_id: "jumpking",
          score: computeScore(),
          level_reached: levelIndex + 1,
          coins: totalCoins,
        });
      } catch (e) {
        console.error("점수 제출 실패", e);
      }
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      if (running) update(dt, now);
      render(now);
      chargeFill.style.width = charging
        ? Math.min((now - chargeStart) / CFG.CHARGE_MAX_MS, 1) * 100 + "%"
        : "0%";
      requestAnimationFrame(loop);
    }

    // ── 이벤트 ─────────────────────────────────────────────
    document.getElementById("btnLeft").addEventListener("pointerdown", e => { e.preventDefault(); startCharge(-1); });
    document.getElementById("btnRight").addEventListener("pointerdown", e => { e.preventDefault(); startCharge(1); });
    window.addEventListener("pointerup", releaseCharge);
    window.addEventListener("pointercancel", releaseCharge);

    document.getElementById("clearNextBtn").addEventListener("click", () => {
      document.getElementById("clearOverlay").classList.remove("show");
      loadLevel(levelIndex + 1);
      running = true;
      lastTime = performance.now();
    });

    document.getElementById("finishRestartBtn").addEventListener("click", () => {
      document.getElementById("finishOverlay").classList.remove("show");
      totalCoins = 0;
      hudCoins.textContent = 0;
      loadLevel(0);
      running = true;
      lastTime = performance.now();
    });

    document.getElementById("btnRanking").addEventListener("click", async (e) => {
      e.preventDefault();
      const lbOverlay = document.getElementById("lbOverlay");
      const lbList = document.getElementById("lbList");
      lbOverlay.classList.add("show");
      lbList.textContent = "불러오는 중...";
      try {
        const { data, error } = await sb
          .from("game_scores")
          .select("username, score, level_reached")
          .eq("game_id", "jumpking")
          .order("score", { ascending: false })
          .limit(50);
        if (error) throw error;
        const seen = new Set();
        const top = [];
        for (const row of data) {
          if (seen.has(row.username)) continue;
          seen.add(row.username);
          top.push(row);
          if (top.length >= 10) break;
        }
        lbList.innerHTML = top.length === 0
          ? "아직 기록이 없습니다."
          : top.map((r, i) =>
              `<div class="jk-lb-row"><span>${i + 1}. ${r.username}</span><b>${r.score}점 (LV${r.level_reached})</b></div>`
            ).join("");
      } catch (err) {
        lbList.textContent = "랭킹을 불러오지 못했습니다.";
      }
    });
    document.getElementById("lbCloseBtn").addEventListener("click", () => {
      document.getElementById("lbOverlay").classList.remove("show");
    });

    // ── 초기화 ─────────────────────────────────────────────
    (async () => {
      if (typeof sb === "undefined") { location.replace("../login.html"); return; }
      const { data } = await sb.auth.getSession();
      if (!data.session) { location.replace("../login.html"); return; }
      try {
        const profile = await getMyProfile(data.session.user.id);
        if (profile.must_change_password) { location.replace("../change-password.html"); return; }
        currentUser = { id: data.session.user.id, username: profile.username };
      } catch (e) {
        location.replace("../login.html");
        return;
      }

      resizeCanvas();
      loadLevel(0);
      running = true;
      lastTime = performance.now();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
