<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM</title>
<link rel="stylesheet" href="css/style.css">
<style>body{display:block;}</style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar__brand" href="index.html">CLASS WEBSITE</a>
    <div class="navbar__menu">
      <a class="navbar__link" href="suggestions.html">건의함</a>
      <a class="navbar__link" href="assessment.html">수행평가</a>
      <a class="navbar__link" href="boardgames.html">보드게임 대여</a>
      <a class="navbar__link" href="users.html" id="navUsersLink" style="display:none;">유저관리</a>
      <a class="navbar__link" href="admin.html" id="navAdminLink" style="display:none;">관리자</a>
    </div>
    <a class="navbar__profile" href="profile.html" id="navProfile">👤 <span id="navUsername"></span></a>
    <a class="navbar__logout" href="#" id="logoutBtn">로그아웃</a>
  </nav>

  <div class="hub">
    <h1 class="hub__title" id="dmTitle">DM</h1>
    <div id="dmContent">불러오는 중...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/site.js"></script>
  <script src="js/hiddenMenus.js"></script>
  <script>
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function hasUnlocked(userId, key) {
      const { data, error } = await sb.rpc("has_unlocked", { target_user: userId, target_key: key });
      if (error) return false;
      return !!data;
    }

    async function getProfileByUsername(username) {
      const { data, error } = await sb.from("profiles").select("*").eq("username", username).single();
      if (error) return null;
      return data;
    }

    function timeLabel(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function renderBubbles(messages, meId) {
      return messages.map(m => `
        <div class="dm-bubble ${m.sender_id === meId ? "dm-bubble--me" : "dm-bubble--them"}">
          <p>${escapeHtml(m.content)}</p>
          <span class="dm-bubble__time">${timeLabel(m.created_at)}</span>
        </div>
      `).join("");
    }

    let pollTimer = null;

    async function renderThread(meId, meUsername, targetProfile) {
      if (pollTimer) clearInterval(pollTimer);
      const container = document.getElementById("dmContent");
      document.getElementById("dmTitle").textContent = targetProfile.username + "님과의 대화";

      container.innerHTML = `
        <a href="dm.html" style="font-size:12px;color:var(--board);text-decoration:none;">← 목록으로</a>
        <div class="dm-thread" id="dmThread"></div>
        <form id="dmForm" class="dm-input-row">
          <input type="text" id="dmInput" autocomplete="off" placeholder="메시지 입력...">
          <button class="btn" type="submit" style="width:auto;padding:10px 18px;">보내기</button>
        </form>
      `;

      const threadEl = document.getElementById("dmThread");
      let firstLoad = true;

      async function load() {
        const { data, error } = await sb
          .from("dm_messages")
          .select("*")
          .or(`and(sender_id.eq.${meId},receiver_id.eq.${targetProfile.id}),and(sender_id.eq.${targetProfile.id},receiver_id.eq.${meId})`)
          .order("created_at", { ascending: true });
        if (error) return;
        const nearBottom = threadEl.scrollTop + threadEl.clientHeight >= threadEl.scrollHeight - 40;
        threadEl.innerHTML = data.length
          ? renderBubbles(data, meId)
          : `<p class="tt-empty">아직 메시지가 없습니다. 먼저 인사해보세요!</p>`;
        if (firstLoad || nearBottom) {
          threadEl.scrollTop = threadEl.scrollHeight;
          firstLoad = false;
        }
      }

      document.getElementById("dmForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const input = document.getElementById("dmInput");
        const content = input.value.trim();
        if (!content) return;
        input.value = "";
        const { error } = await sb.from("dm_messages").insert({
          sender_id: meId,
          sender_username: meUsername,
          receiver_id: targetProfile.id,
          receiver_username: targetProfile.username,
          content,
        });
        if (error) { alert("전송 실패: " + error.message); return; }
        await load();
      });

      await load();
      pollTimer = setInterval(load, 4000);
    }

    async function renderList(meId) {
      const container = document.getElementById("dmContent");
      document.getElementById("dmTitle").textContent = "DM";

      const { data, error } = await sb
        .from("dm_messages")
        .select("*")
        .or(`sender_id.eq.${meId},receiver_id.eq.${meId}`)
        .order("created_at", { ascending: false });

      if (error) {
        container.innerHTML = `<p class="tt-empty">불러오지 못했습니다.</p>`;
        return;
      }

      const seen = new Map();
      for (const m of data) {
        const otherId = m.sender_id === meId ? m.receiver_id : m.sender_id;
        const otherName = m.sender_id === meId ? m.receiver_username : m.sender_username;
        if (!seen.has(otherId)) seen.set(otherId, { username: otherName, last: m });
      }

      if (seen.size === 0) {
        container.innerHTML = `<p class="tt-empty">아직 대화가 없습니다. 프로필 페이지의 'DM 보내기'로 시작해보세요.</p>`;
        return;
      }

      container.innerHTML = Array.from(seen.values()).map(info => `
        <a class="dm-list-item" href="dm.html?with=${encodeURIComponent(info.username)}">
          <span class="dm-list-item__name">${escapeHtml(info.username)}</span>
          <span class="dm-list-item__preview">${escapeHtml(info.last.content).slice(0, 40)}</span>
        </a>
      `).join("");
    }

    async function renderAdminView(targetProfile) {
      const container = document.getElementById("dmContent");
      document.getElementById("dmTitle").textContent = targetProfile.username + "님의 DM 기록 (관리자 조회)";

      const { data, error } = await sb
        .from("dm_messages")
        .select("*")
        .or(`sender_id.eq.${targetProfile.id},receiver_id.eq.${targetProfile.id}`)
        .order("created_at", { ascending: true });

      if (error) {
        container.innerHTML = `<p class="tt-empty">불러오지 못했습니다.</p>`;
        return;
      }
      if (!data.length) {
        container.innerHTML = `<p class="tt-empty">대화 기록이 없습니다.</p>`;
        return;
      }

      const groups = new Map();
      for (const m of data) {
        const otherId = m.sender_id === targetProfile.id ? m.receiver_id : m.sender_id;
        const otherName = m.sender_id === targetProfile.id ? m.receiver_username : m.sender_username;
        if (!groups.has(otherId)) groups.set(otherId, { username: otherName, messages: [] });
        groups.get(otherId).messages.push(m);
      }

      container.innerHTML = Array.from(groups.values()).map(g => `
        <h2 class="hub__title" style="font-size:14px; margin-top:18px;">${escapeHtml(targetProfile.username)} ↔ ${escapeHtml(g.username)}</h2>
        <div class="dm-thread dm-thread--static">
          ${renderBubbles(g.messages, targetProfile.id)}
        </div>
      `).join("");
    }

    document.getElementById("logoutBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      await sb.auth.signOut();
      location.href = "login.html";
    });

    (async () => {
      if (typeof sb === "undefined") { location.replace("login.html"); return; }
      const { data } = await sb.auth.getSession();
      if (!data.session) { location.replace("login.html"); return; }
      let myProfile;
      try {
        myProfile = await getMyProfile(data.session.user.id);
      } catch (e) {
        location.replace("login.html");
        return;
      }
      if (myProfile.must_change_password) { location.replace("change-password.html"); return; }

      window.currentUser = { id: data.session.user.id, username: myProfile.username };
      initSiteChrome(myProfile);
      if (window.initHiddenMenus) await window.initHiddenMenus();

      const params = new URLSearchParams(location.search);
      const withUser = params.get("with");
      const adminViewUser = params.get("admin_view");
      const container = document.getElementById("dmContent");

      if (adminViewUser && myProfile.is_admin) {
        const target = await getProfileByUsername(adminViewUser);
        if (!target) { container.innerHTML = `<p class="tt-empty">유저를 찾을 수 없습니다.</p>`; return; }
        await renderAdminView(target);
        return;
      }

      if (withUser) {
        const iOk = await hasUnlocked(myProfile.id, "dm");
        if (!iOk) { container.innerHTML = `<p class="tt-empty">DM 기능이 해금되어 있지 않습니다.</p>`; return; }

        const target = await getProfileByUsername(withUser);
        if (!target) { container.innerHTML = `<p class="tt-empty">유저를 찾을 수 없습니다.</p>`; return; }

        const targetOk = await hasUnlocked(target.id, "dm");
        if (!targetOk) { container.innerHTML = `<p class="tt-empty">상대방이 아직 DM을 해금하지 않았습니다.</p>`; return; }

        await renderThread(myProfile.id, myProfile.username, target);
        return;
      }

      await renderList(myProfile.id);
    })();
  </script>
</body>
</html>
