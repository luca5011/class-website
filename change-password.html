<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 변경</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="card">
    <div class="card__band">
      <p class="card__eyebrow">CLASS WEBSITE</p>
      <h1 class="card__title" id="titleText">비밀번호 변경</h1>
    </div>
    <div class="card__body">
      <form id="pwForm">
        <div class="field">
          <label for="newPw">새 비밀번호</label>
          <input id="newPw" type="password" minlength="6" required>
        </div>
        <div class="field">
          <label for="newPw2">새 비밀번호 확인</label>
          <input id="newPw2" type="password" minlength="6" required>
        </div>
        <button class="btn" type="submit" id="pwBtn">변경하기</button>
        <p class="msg" id="msg"></p>
      </form>
      <p class="hint" id="hintText">6자 이상으로 설정해 주세요.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/change-password.js"></script>
</body>
</html>
