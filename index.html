<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메인</title>
<link rel="stylesheet" href="css/style.css">
<style>body{display:block;}</style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar__brand" href="index.html">CLASS WEBSITE</a>
    <div class="navbar__menu">
      <a class="navbar__link" href="suggestions.html">건의함</a>
      <a class="navbar__link" href="assessment.html">수행평가</a>
      <a class="navbar__link" href="boardgames.html">보드게임 대여</a>
      <a class="navbar__link" href="users.html" id="navUsersLink" style="display:none;">유저관리</a>
    </div>
    <a class="navbar__profile" href="profile.html" id="navProfile">👤 <span id="navUsername"></span></a>
    <a class="navbar__logout" href="#" id="logoutBtn">로그아웃</a>
  </nav>

  <div class="hub">
    <h1 class="hub__title">1-3 시간표</h1>

    <div class="tt-card">
      <div class="tt-card__head">
        <h2>이번 주 시간표</h2>
        <button class="tt-upload-btn" id="ttUploadBtn" style="display:none;">이미지 변경</button>
        <input type="file" id="ttFileInput" accept="image/*" style="display:none;">
      </div>
      <div class="tt-card__body">
        <img id="ttImg" style="display:none;" alt="시간표">
        <p class="tt-empty" id="ttEmpty">아직 등록된 시간표가 없습니다.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/site.js"></script>
  <script src="js/hiddenMenus.js"></script>
  <script>
    const TT_BUCKET = "timetable";
    const TT_PATH = "current.img";

    const ttImg = document.getElementById("ttImg");
    const ttEmpty = document.getElementById("ttEmpty");
    const ttUploadBtn = document.getElementById("ttUploadBtn");
    const ttFileInput = document.getElementById("ttFileInput");

    async function loadTimetableImage() {
      const { data: listData } = await sb.storage.from(TT_BUCKET).list("");
      const meta = listData && listData.find(f => f.name === TT_PATH);
      if (!meta) {
        ttImg.style.display = "none";
        ttEmpty.style.display = "block";
        return;
      }
      const { data: urlData } = sb.storage.from(TT_BUCKET).getPublicUrl(TT_PATH);
      ttImg.src = urlData.publicUrl + "?v=" + new Date(meta.updated_at).getTime();
      ttImg.style.display = "block";
      ttEmpty.style.display = "none";
    }

    async function uploadTimetable(file) {
      const { error } = await sb.storage.from(TT_BUCKET).upload(TT_PATH, file, { upsert: true });
      if (error) {
        alert("업로드에 실패했습니다: " + error.message);
        return;
      }
      await loadTimetableImage();
    }

    ttUploadBtn.addEventListener("click", () => ttFileInput.click());
    ttFileInput.addEventListener("change", () => {
      const file = ttFileInput.files[0];
      if (file) uploadTimetable(file);
      ttFileInput.value = "";
    });

    document.getElementById("logoutBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      await sb.auth.signOut();
      location.href = "login.html";
    });

    // ── 로그인 확인 ────────────────────────────────
    (async () => {
      if (typeof sb === "undefined") { location.replace("login.html"); return; }
      const { data } = await sb.auth.getSession();
      if (!data.session) { location.replace("login.html"); return; }
      let profile;
      try {
        profile = await getMyProfile(data.session.user.id);
      } catch (e) {
        location.replace("login.html");
        return;
      }
      if (profile.must_change_password) { location.replace("change-password.html"); return; }

      window.currentUser = { id: data.session.user.id, username: profile.username };
      initSiteChrome(profile);
      if (window.initHiddenMenus) await window.initHiddenMenus();

      if (profile.is_admin) ttUploadBtn.style.display = "inline-block";

      await loadTimetableImage();
    })();
  </script>
</body>
</html>
