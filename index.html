<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메인</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="card">
    <div class="card__band">
      <p class="card__eyebrow">CLASS WEBSITE</p>
      <h1 class="card__title">로그인 완료</h1>
    </div>
    <div class="card__body">
      <p class="msg msg--info" id="who"></p>
      <button class="btn" id="logoutBtn">로그아웃</button>
      <p class="hint">상단바(수행평가 / 시간표·급식 / 미니게임 / 건의함 / 자유게시판 / 관리자) 및 메인 화면은 다음 단계에서 제작 예정입니다.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    (async () => {
      const session = await requireLogin();
      if (!session) return;
      const profile = await getMyProfile(session.user.id);
      if (profile.must_change_password) {
        location.href = "change-password.html";
        return;
      }
      document.getElementById("who").textContent =
        `${profile.username}${profile.is_admin ? " (관리자)" : ""} 님, 환영합니다.`;
    })();

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      location.href = "login.html";
    });
  </script>
</body>
</html>
